<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Clinic automation funnel">
<rect width="100%" height="100%" rx="26" fill="#FFFFFF"/>
<text x="70" y="54" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">AI clinic funnel proposed for SEA Clinic</text>
<text x="70" y="80" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6B7280">Public inquiry → structured pipeline → booking → review → reactivation</text>
<g font-family="Inter, Arial, sans-serif">
  <rect x="80" y="130" width="820" height="62" rx="18" fill="#EEF2FF"/><text x="110" y="168" font-size="18" font-weight="700" fill="#312E81">1. Website / Google / Instagram / TikTok inquiry</text>
  <path d="M490 198 L490 222" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <rect x="130" y="222" width="720" height="62" rx="18" fill="#F5F3FF"/><text x="160" y="260" font-size="18" font-weight="700" fill="#5B21B6">2. WhatsApp + LINE AI concierge qualifies the lead</text>
  <path d="M490 290 L490 314" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <rect x="180" y="314" width="620" height="62" rx="18" fill="#ECFDF5"/><text x="210" y="352" font-size="18" font-weight="700" fill="#047857">3. Staff receives clean treatment, urgency and booking context</text>
  <path d="M490 382 L490 406" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <rect x="230" y="406" width="520" height="62" rx="18" fill="#FFF7ED"/><text x="260" y="444" font-size="18" font-weight="700" fill="#C2410C">4. Reminder, review request and reactivation loop</text>
  <text x="80" y="520" font-size="15" fill="#374151">Result: fewer lost chats, stronger reviews, better repeat treatment timing, clearer clinic pipeline.</text>
</g>
</svg>