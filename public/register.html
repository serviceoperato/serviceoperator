<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){var k='so-theme',d=document.documentElement,t;try{t=localStorage.getItem(k)}catch(e){}if(t!=='light'&&t!=='dark')t='light';d.setAttribute('data-theme',t)})();</script>
<title>Create account · ServiceOpera.to</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="/assets/favicon.png" type="image/png" sizes="any" />
<link rel="apple-touch-icon" href="/assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<script src="/page-skeleton.js"></script>
<script src="/so-api.js"></script>
<style>
  .page-user-portal { font-family: var(--font-body); min-height: 100vh; }
  .tf-reg-wrap { max-width: 420px; margin: 0 auto; padding: 2rem 1.5rem; }
  .tf-input { width: 100%; padding: 0.85rem 0.9rem; border-radius: 12px; border: 1px solid var(--line-strong); background: var(--ink); color: var(--paper); font-size: 1rem; box-sizing: border-box; font-family: var(--font-body); }
  .tf-cap { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--mute-2); }
  .tf-success-icon { width: 92px; height: 92px; border-radius: 24px; border: 1px solid var(--line); background: var(--ink-2); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.1rem; font-size: 2rem; }
  .page-user-portal .nav__login { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
  .page-user-portal .portal-caption {
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mute-2);
  }
  .page-user-portal .portal-caption--accent { color: var(--amber-2); }
</style>
</head>
<body class="page-admin page-admin--with-nav page-user-portal">

<div class="grain" aria-hidden="true"></div>

<nav class="nav" aria-label="Primary">
  <a href="/" class="nav__logo">
    <img class="nav__logo-img brand-logo" src="/assets/logo.png" width="220" height="90" alt="ServiceOpera.to — home" decoding="async" />
  </a>
  <div class="nav__links">
    <a href="/pricing" class="nav__text">Pricing</a>
    <a href="/login.html" class="nav__login" id="navPortalAuth">Log in</a>
    <button type="button" class="theme-toggle" data-theme-toggle aria-label="Theme"></button>

  </div>
</nav>

<div class="admin-gate">
  <div class="admin-gate__card" style="max-width: 460px">
    <div id="regStepForm">
      <div class="tf-reg-wrap">
        <p class="portal-caption portal-caption--accent" style="margin-bottom:1rem">— USER ACCESS</p>
        <h1 id="regTitle" style="font-size:1.65rem;font-weight:700;margin:0;font-family:var(--font-body)">Create account</h1>

        <form id="regForm" class="portal-form" style="margin-top:1.15rem" autocomplete="on">
          <label>
            <span class="tf-cap" id="capEmail">EMAIL</span>
            <input type="email" name="email" id="regEmail" class="tf-input" required autocomplete="email" />
          </label>
          <label style="margin-top:12px;display:block">
            <span class="tf-cap" id="capPw">PASSWORD</span>
            <input type="password" name="password" id="regPw" class="tf-input" required minlength="8" autocomplete="new-password" placeholder="min 8 characters" />
          </label>
          <p class="portal-form__hint" id="regHint"></p>
          <button type="submit" class="btn btn--primary btn--block" id="regSubmit">Create account<span class="ico-arrow-r" aria-hidden="true"></span></button>
        </form>
        <p style="margin-top:14px;text-align:center;color:var(--mute-2);font-size:0.9rem">
          <span id="haveAcct">Already have an account?</span> <a href="login.html" id="lnkLogin">Log in</a>
        </p>
        <p class="modal__footnote" style="margin-top:1.5rem"><a href="/"><span class="ico-arrow-l" aria-hidden="true"></span>Back to site</a></p>
      </div>
    </div>

    <div id="regStepSent" class="is-hidden">
      <div class="tf-reg-wrap" style="text-align:center;padding-top:2rem">
        <div class="tf-success-icon" aria-hidden="true">✉️</div>
        <h1 id="sentTitle" style="font-size:1.35rem;font-weight:900;margin:0">Check your email</h1>
        <p id="sentBody" class="admin-gate__lede" style="text-align:center;margin-top:0.65rem">We sent a confirmation link. Open it to activate your account, then return to log in.</p>
        <p style="margin-top:1.25rem;font-size:0.9rem"><a href="login.html?registered=1" id="lnkAfter">Go to log in</a></p>
      </div>
    </div>
  </div>
</div>

<script src="/sw-register.js"></script>
<script src="user-account-menu.js"></script>
<script src="theme.js"></script>
<script src="debug.js"></script>
<script>
(function () {
  var ERR = {
    email: 'Enter a valid email.',
    pw: 'Password must be at least 8 characters.',
  };

  function req(method, path, body) {
    return fetch((typeof soApiUrl === 'function' ? soApiUrl(path) : path), {
      method: method,
      credentials: typeof soApiCredentials === 'function' ? soApiCredentials() : 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      cache: 'no-store',
    }).then(function (r) {
      return r.text().then(function (text) {
        var j = null;
        try { j = text ? JSON.parse(text) : null; } catch (e) {}
        return { ok: r.ok, status: r.status, json: j, text: text };
      });
    });
  }

  document.getElementById('regForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var email = (document.getElementById('regEmail').value || '').trim();
    var pw = (document.getElementById('regPw').value || '').trim();
    var hint = document.getElementById('regHint');
    hint.textContent = '';
    hint.className = 'portal-form__hint';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      hint.textContent = ERR.email;
      hint.className = 'portal-form__hint is-error';
      return;
    }
    if (pw.length < 8) {
      hint.textContent = ERR.pw;
      hint.className = 'portal-form__hint is-error';
      return;
    }
    hint.textContent = '…';
    req('POST', '/api/auth/user-register', { email: email, password: pw }).then(function (r) {
      if (!r.ok) {
        hint.textContent = (r.json && r.json.error) || 'Request failed.';
        hint.className = 'portal-form__hint is-error';
        return;
      }
      document.getElementById('regStepForm').classList.add('is-hidden');
      document.getElementById('regStepSent').classList.remove('is-hidden');
    }).catch(function () {
      hint.textContent = 'Network error.';
      hint.className = 'portal-form__hint is-error';
    });
  });
})();
</script>
</body>
</html>
